<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Servana — Browse Category</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <style>
    .cat-hero{background:linear-gradient(130deg,var(--brand-deep),var(--brand) 60%,var(--accent));padding:28px 20px 28px;position:relative;overflow:hidden}
    .cat-hero::before{content:'';position:absolute;width:260px;height:260px;border-radius:50%;top:-70px;right:-50px;background:rgba(255,255,255,.04)}
    .cat-hero-icon{font-size:42px;margin-bottom:10px;position:relative;z-index:1}
    .cat-hero-name{font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:700;color:#fff;position:relative;z-index:1;line-height:1.2}
    .cat-hero-sub{font-size:13px;color:rgba(255,255,255,.65);margin-top:6px;position:relative;z-index:1}
    .providers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
    @media(max-width:480px){.providers-grid{grid-template-columns:1fr}}
    @media(min-width:481px)and(max-width:767px){.providers-grid{grid-template-columns:1fr 1fr}}
    .pc-top{padding:16px 16px 0;display:flex;align-items:flex-start;gap:12px}
    .pc-av{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
    .pc-av-wrap{position:relative;flex-shrink:0}
    .pc-online{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--success);border:2px solid var(--bg-card)}
    .pc-verified{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--info);border:2px solid var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
    .pc-info{flex:1;min-width:0}
    .pc-name{font-size:15px;font-weight:700;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pc-role{font-size:12px;color:var(--text-2);margin-top:1px}
    .pc-stars{display:flex;align-items:center;gap:4px;margin-top:5px}
    .pc-rnum{font-size:12px;font-weight:600;color:var(--text-1)}
    .pc-rv{font-size:11px;color:var(--text-3)}
    .pc-body{padding:12px 16px;flex:1}
    .pc-desc{font-size:12.5px;color:var(--text-2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
    .pc-meta{display:flex;gap:12px;font-size:11px;color:var(--text-3)}
    .pc-meta-item{display:flex;align-items:center;gap:4px}
    .pc-meta-item svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
    .pc-foot{padding:12px 16px;border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .pc-price{font-size:16px;font-weight:700;color:var(--brand);line-height:1}
    .pc-price span{font-size:10px;font-weight:400;color:var(--text-3);display:block;margin-top:1px}
    .skel-card{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;gap:10px}
    /* Related cats */
    .related-cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
    .related-cats::-webkit-scrollbar{display:none}
    .rc-pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s;text-decoration:none}
    .rc-pill:hover{border-color:var(--border-hover);color:var(--text-1)}
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="spinner-overlay"><div class="spinner-ring"></div></div>

<!-- Header -->
<header class="header">
  <a href="./seeker.html" class="header-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="header-title" id="headerTitle">CATEGORY<span id="headerSub">Browse providers</span></div>
  <button class="hdr-btn" onclick="location.href='./seeker.html'" aria-label="All services" title="All services">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
  </button>
</header>

<!-- Category hero -->
<div class="cat-hero">
  <div class="cat-hero-icon" id="catIcon">📂</div>
  <div class="cat-hero-name" id="catName">Loading…</div>
  <div class="cat-hero-sub" id="catSub">Finding available providers…</div>
</div>

<main class="page-lg" role="main">

  <!-- Search within category -->
  <div class="search-bar">
    <div class="search-field">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="search" id="searchInput" placeholder="Search within this category…" autocomplete="off">
    </div>
    <select class="loc-select" id="locationSelect">
      <option value="">All Cities</option>
      <option>Abuja</option><option>Lagos</option><option>Port Harcourt</option>
      <option>Ibadan</option><option>Kano</option><option>Enugu</option><option>Benin City</option>
    </select>
    <button class="btn btn-primary" id="searchBtn">Search</button>
  </div>

  <!-- Filter chips -->
  <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
    <button class="fchip active" data-f="all" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .18s">All</button>
    <button class="fchip" data-f="available" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .18s">Available Now</button>
    <button class="fchip" data-f="verified" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .18s">Verified</button>
    <button class="fchip" data-f="top" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .18s">Top Rated 4.0+</button>
    <select id="sortSel" style="margin-left:auto;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;outline:none">
      <option value="rating">Top Rated</option>
      <option value="price_asc">Price: Low → High</option>
      <option value="price_desc">Price: High → Low</option>
    </select>
  </div>

  <!-- Results header -->
  <div class="sec-head">
    <div><h2 class="sec-title" id="resTitle">Providers</h2><p class="sec-sub" id="resSub">Loading…</p></div>
  </div>

  <!-- Providers grid -->
  <div class="providers-grid" id="providersGrid">
    <div class="skel-card"><div style="display:flex;gap:10px"><div class="skel" style="width:52px;height:52px;border-radius:50%;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:7px"><div class="skel" style="height:13px;width:70%"></div><div class="skel" style="height:11px;width:50%"></div></div></div><div class="skel" style="height:11px;width:90%"></div><div class="skel" style="height:11px;width:70%"></div></div>
    <div class="skel-card"><div style="display:flex;gap:10px"><div class="skel" style="width:52px;height:52px;border-radius:50%;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:7px"><div class="skel" style="height:13px;width:60%"></div><div class="skel" style="height:11px;width:45%"></div></div></div><div class="skel" style="height:11px;width:80%"></div><div class="skel" style="height:11px;width:65%"></div></div>
  </div>

  <!-- Related categories -->
  <div style="margin-top:32px">
    <div class="sec-head"><div><h2 class="sec-title">Related Categories</h2><p class="sec-sub">Explore similar services</p></div></div>
    <div class="related-cats" id="relatedCats">
      <a href="./seeker.html" class="rc-pill">🌐 All Services</a>
    </div>
  </div>

</main>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn" onclick="location.href='./dashboard.html'"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></button>
  <button class="nav-btn active"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Find</span></button>
  <button class="nav-btn" onclick="location.href='./bookings.html'"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Bookings</span></button>
  <button class="nav-btn" onclick="location.href='./chat.html'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Chat</span></button>
  <button class="nav-btn" onclick="location.href='./profile.html'"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profile</span></button>
</nav>

<script type="module">
import { auth, db, toast, esc, starsHtml, initials, formatNGN, debounce } from "./assets/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = id => document.getElementById(id);
const params   = new URLSearchParams(location.search);
const catName  = decodeURIComponent(params.get("cat") || params.get("category") || "");

let allProviders = [], activeFilter = "all", activeSort = "rating";

// Update page header
if (catName) {
  document.title     = `Servana — ${catName}`;
  $("catName").textContent      = catName;
  $("headerTitle").childNodes[0].textContent = catName.toUpperCase();
  $("headerSub").textContent    = `Browse ${catName.toLowerCase()} providers`;
  $("resTitle").textContent     = `${catName} Providers`;
}

onAuthStateChanged(auth, user => {
  if (!user) { location.href = "./login.html"; return; }
  loadProviders();
  loadRelatedCategories();
});

async function loadProviders() {
  try {
    let snap;
    if (catName) {
      snap = await getDocs(query(collection(db,"providers"), where("category","==",catName)));
      // If no exact matches, load all and filter client-side
      if (snap.empty) snap = await getDocs(collection(db,"providers"));
    } else {
      snap = await getDocs(collection(db,"providers"));
    }
    allProviders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // If we fetched all, filter by category
    if (catName) {
      const exact = allProviders.filter(p => (p.category||"").toLowerCase() === catName.toLowerCase() || (p.role||"").toLowerCase().includes(catName.toLowerCase()));
      if (exact.length) allProviders = exact;
    }

    $("catSub").textContent = `${allProviders.length} provider${allProviders.length!==1?"s":""} available`;
    applyFilters();
  } catch(e) {
    $("providersGrid").innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><p class="empty-title">Couldn't load providers</p><p class="empty-sub">Check your connection and try again.</p><button class="btn btn-secondary mt-2" onclick="loadProviders()">Retry</button></div>`;
  }
}

async function loadRelatedCategories() {
  try {
    const snap = await getDocs(collection(db,"category"));
    const others = snap.docs.map(d => d.data()).filter(c => c.name !== catName).slice(0,8);
    const el     = $("relatedCats");
    others.forEach(c => {
      const a = document.createElement("a");
      a.href      = `./category.html?cat=${encodeURIComponent(c.name||"")}`;
      a.className = "rc-pill";
      a.innerHTML = `${c.icon||"📂"} ${esc(c.name||"")}`;
      el.appendChild(a);
    });
  } catch(e) {}
}

// Set hero icon from Firestore
(async () => {
  if (!catName) return;
  try {
    const snap = await getDocs(collection(db,"category"));
    const cat  = snap.docs.map(d => d.data()).find(c => c.name === catName);
    if (cat?.icon) $("catIcon").textContent = cat.icon;
  } catch(e) {}
})();

function applyFilters() {
  const kw  = $("searchInput").value.trim().toLowerCase();
  const loc = $("locationSelect").value.toLowerCase();
  let list  = [...allProviders];

  if (loc) list = list.filter(p => (p.location||"").toLowerCase().includes(loc));
  if (kw)  list = list.filter(p => [p.name,p.role,p.description].some(f => f?.toLowerCase().includes(kw)));
  if (activeFilter==="available") list = list.filter(p => p.available!==false);
  if (activeFilter==="verified")  list = list.filter(p => p.verified);
  if (activeFilter==="top")       list = list.filter(p => parseFloat(p.rating||0)>=4);

  list.sort((a,b) => {
    if (activeSort==="rating")     return (parseFloat(b.rating)||0)-(parseFloat(a.rating)||0);
    if (activeSort==="price_asc")  return (parseFloat(a.startingPrice)||0)-(parseFloat(b.startingPrice)||0);
    if (activeSort==="price_desc") return (parseFloat(b.startingPrice)||0)-(parseFloat(a.startingPrice)||0);
    return 0;
  });

  $("resSub").textContent = `${list.length} provider${list.length!==1?"s":""} found`;
  renderProviders(list);
}

function renderProviders(list) {
  const grid = $("providersGrid");
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p class="empty-title">No providers found</p><p class="empty-sub">Try adjusting your filters, or <a href="./seeker.html" style="color:var(--accent);font-weight:600">browse all services</a>.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const rating = parseFloat(p.rating||0).toFixed(1);
    const avail  = p.available!==false;
    const price  = p.startingPrice ? formatNGN(p.startingPrice) : "Varies";
    const ini    = initials(p.name);
    return `
    <article class="provider-card" tabindex="0" role="button" data-id="${esc(p.id)}" onclick="location.href='./seeker.html'" aria-label="Book ${esc(p.name||"")}">
      <div class="pc-top">
        <div class="pc-av-wrap">
          ${p.photoURL
            ? `<img class="pc-av" src="${esc(p.photoURL)}" alt="${esc(p.name)}" onerror="this.outerHTML='<div class=\\'pc-av\\'>${ini}</div>'">`
            : `<div class="pc-av">${ini}</div>`}
          ${avail ? `<div class="pc-online"></div>` : ""}
          ${p.verified ? `<div class="pc-verified">✓</div>` : ""}
        </div>
        <div class="pc-info">
          <div class="pc-name">${esc(p.name||"Provider")}</div>
          <div class="pc-role">${esc(p.role||catName||"Service Provider")}</div>
          <div class="pc-stars">${starsHtml(rating)}<span class="pc-rnum">${rating}</span><span class="pc-rv">(${p.reviewCount||0})</span></div>
        </div>
        <span class="badge ${avail?"badge-success":"badge-danger"}">${avail?"Available":"Busy"}</span>
      </div>
      <div class="pc-body">
        ${p.description?`<p class="pc-desc">${esc(p.description)}</p>`:""}
        <div class="pc-meta">
          ${p.location?`<span class="pc-meta-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(p.location)}</span>`:""}
          ${p.completedJobs?`<span class="pc-meta-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${p.completedJobs} jobs</span>`:""}
        </div>
      </div>
      <div class="pc-foot">
        <div class="pc-price">${price}<span>starting price</span></div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();location.href='./seeker.html'">Book Now</button>
      </div>
    </article>`;
  }).join("");
}

// Filter chips
document.querySelectorAll(".fchip").forEach(c => c.addEventListener("click", () => {
  document.querySelectorAll(".fchip").forEach(x => { x.style.background="var(--bg-card)"; x.style.color="var(--text-2)"; x.style.borderColor="var(--border)"; x.classList.remove("active"); });
  c.style.background="var(--accent)"; c.style.color="#fff"; c.style.borderColor="var(--accent)";
  c.classList.add("active"); activeFilter = c.dataset.f; applyFilters();
}));

$("sortSel").addEventListener("change", () => { activeSort=$("sortSel").value; applyFilters(); });
$("searchBtn").addEventListener("click", applyFilters);
$("searchInput").addEventListener("keydown", e => { if(e.key==="Enter") applyFilters(); });
$("searchInput").addEventListener("input", debounce(applyFilters));
$("locationSelect").addEventListener("change", applyFilters);
</script>
</body>
</html>
