<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Servana — My Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
  <style>
    .booking-card{background:var(--bg-card);border:.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow-xs);transition:box-shadow .2s}
    .booking-card:hover{box-shadow:var(--shadow-md)}
    .bc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:.5px solid var(--border)}
    .bc-ref{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px}
    .bc-body{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
    .bc-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0;border:1.5px solid var(--border)}
    .bc-info{flex:1;min-width:0}
    .bc-name{font-size:15px;font-weight:700;color:var(--text-1)}
    .bc-service{font-size:12px;color:var(--text-2);margin-top:2px}
    .bc-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:7px}
    .bc-meta-item{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:4px}
    .bc-meta-item svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
    .bc-amount{font-size:17px;font-weight:700;color:var(--brand);flex-shrink:0}
    .bc-footer{padding:10px 16px;border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .bc-actions{display:flex;gap:8px;flex-wrap:wrap}
    .bc-notes{padding:10px 16px;border-top:.5px solid var(--border);font-size:12px;color:var(--text-3);font-style:italic}
    /* Review modal */
    .star-input{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
    .star-input button{font-size:28px;background:none;border:none;cursor:pointer;color:#CBD5E1;transition:color .15s}
    .star-input button.on{color:#F59E0B}
    .star-input button:hover{color:#F59E0B}
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="spinner-overlay"><div class="spinner-ring"></div></div>

<!-- Review modal -->
<div class="modal-overlay" id="reviewOverlay" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title">⭐ Leave a Review</span>
      <button class="modal-close" id="closeReview"><svg viewBox="0 0 24 24" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <p style="font-size:13px;color:var(--text-2);text-align:center;margin-bottom:16px" id="reviewProviderName">How was your experience?</p>
    <div class="star-input" id="starInput">
      <button data-v="1">★</button><button data-v="2">★</button>
      <button data-v="3">★</button><button data-v="4">★</button><button data-v="5">★</button>
    </div>
    <div class="modal-form">
      <div class="field">
        <label>Comment (optional)</label>
        <textarea id="reviewComment" placeholder="Tell others about your experience…" style="min-height:90px"></textarea>
      </div>
      <button class="btn btn-primary btn-block" id="submitReview">
        <span class="btn-text">Submit Review</span>
        <span class="btn-spin-wrap"><div class="btn-spin"></div></span>
      </button>
    </div>
  </div>
</div>

<!-- Cancel confirm modal -->
<div class="modal-overlay" id="cancelOverlay" role="dialog" aria-modal="true">
  <div class="modal-box" style="max-width:380px">
    <div class="modal-handle"></div>
    <div style="text-align:center;padding:10px 0 20px">
      <div style="font-size:48px;margin-bottom:12px">🚫</div>
      <div style="font-size:18px;font-weight:700;color:var(--text-1);margin-bottom:8px">Cancel Booking?</div>
      <p style="font-size:13px;color:var(--text-2);line-height:1.6">This will notify the provider. Cancellations may be subject to policy.</p>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-secondary w-full" id="cancelNo">Keep Booking</button>
      <button class="btn btn-danger w-full" id="cancelYes">Yes, Cancel</button>
    </div>
  </div>
</div>

<!-- Header -->
<header class="header">
  <a href="./dashboard.html" class="header-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="header-title">MY BOOKINGS<span>Track your service requests</span></div>
  <button class="hdr-btn" onclick="location.href='./seeker.html'" aria-label="Find services" title="Find services">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</header>

<main class="page-sm" role="main">

  <!-- Stats row -->
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)" id="bookingStats">
    <div class="stat-card"><div class="sc-icon blue">📅</div><div class="sc-val" id="statUpcoming">—</div><div class="sc-label">Upcoming</div></div>
    <div class="stat-card"><div class="sc-icon green">✅</div><div class="sc-val" id="statCompleted">—</div><div class="sc-label">Completed</div></div>
    <div class="stat-card"><div class="sc-icon purple">💰</div><div class="sc-val" id="statSpent">—</div><div class="sc-label">Total Spent</div></div>
  </div>

  <!-- Tab pills -->
  <div class="pill-tabs mb-3" id="bookingTabs" role="tablist">
    <button class="pill-tab active" data-tab="all">All <span class="pill-cnt" id="cnt-all">0</span></button>
    <button class="pill-tab" data-tab="pending">Pending <span class="pill-cnt" id="cnt-pending">0</span></button>
    <button class="pill-tab" data-tab="accepted">Accepted <span class="pill-cnt" id="cnt-accepted">0</span></button>
    <button class="pill-tab" data-tab="completed">Completed <span class="pill-cnt" id="cnt-completed">0</span></button>
    <button class="pill-tab" data-tab="cancelled">Cancelled <span class="pill-cnt" id="cnt-cancelled">0</span></button>
  </div>

  <!-- Bookings list -->
  <div id="bookingsList">
    <div class="skel" style="height:120px;margin-bottom:12px;border-radius:16px"></div>
    <div class="skel" style="height:120px;margin-bottom:12px;border-radius:16px"></div>
    <div class="skel" style="height:120px;border-radius:16px"></div>
  </div>

</main>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn" onclick="location.href='./dashboard.html'"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></button>
  <button class="nav-btn" onclick="location.href='./seeker.html'"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Find</span></button>
  <button class="nav-btn active"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Bookings</span></button>
  <button class="nav-btn" onclick="location.href='./chat.html'"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Chat</span></button>
  <button class="nav-btn" onclick="location.href='./profile.html'"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profile</span></button>
</nav>

<script type="module">
import { auth, db, toast, showSpinner, hideSpinner, esc, formatNGN, initials } from "./assets/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, query, where, getDocs, doc, updateDoc, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = id => document.getElementById(id);
let currentUser = null, allBookings = [], activeTab = "all";
let cancelBookingId = null, reviewBookingId = null, reviewProviderId = null, selectedStars = 0;

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = "./login.html"; return; }
  currentUser = user;
  await loadBookings();
});

async function loadBookings() {
  try {
    const q    = query(collection(db, "bookings"), where("seekerId","==", currentUser.uid));
    const snap = await getDocs(q);
    allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allBookings.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    updateCounts(); updateStats(); renderList();
  } catch(e) {
    console.error(e);
    $("bookingsList").innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p class="empty-title">Couldn't load bookings</p><p class="empty-sub">Check your connection and try again.</p><button class="btn btn-secondary mt-2" onclick="loadBookings()">Retry</button></div>`;
  }
}

function updateCounts() {
  const counts = { all: allBookings.length, pending: 0, accepted: 0, completed: 0, cancelled: 0 };
  allBookings.forEach(b => { if (counts[b.status]!==undefined) counts[b.status]++; });
  Object.entries(counts).forEach(([k,v]) => { const el = $(`cnt-${k}`); if (el) el.textContent = v; });
}

function updateStats() {
  const upcoming  = allBookings.filter(b => b.status==="pending"||b.status==="accepted").length;
  const completed = allBookings.filter(b => b.status==="completed");
  const spent     = completed.reduce((s,b) => s + (b.total||0), 0);
  $("statUpcoming").textContent  = upcoming;
  $("statCompleted").textContent = completed.length;
  $("statSpent").textContent     = formatNGN(spent);
}

function renderList() {
  const list = activeTab==="all" ? allBookings : allBookings.filter(b => b.status===activeTab);
  const el   = $("bookingsList");

  if (!list.length) {
    const msgs = { all:"No bookings yet", pending:"No pending bookings", accepted:"No accepted bookings", completed:"No completed bookings", cancelled:"No cancelled bookings" };
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p class="empty-title">${msgs[activeTab]||"No bookings"}</p><p class="empty-sub"><a href="./seeker.html" style="color:var(--accent);font-weight:600">Find a service →</a></p></div>`;
    return;
  }

  el.innerHTML = list.map(b => {
    const ini = initials(b.providerName||"P");
    const canCancel  = b.status==="pending";
    const canReview  = b.status==="completed" && !b.reviewed;
    return `
    <div class="booking-card">
      <div class="bc-header">
        <span class="bc-ref">🔖 ${esc(b.bookingRef||b.id.slice(0,8).toUpperCase())}</span>
        <span class="badge badge-${esc(b.status)}">${esc(b.status.charAt(0).toUpperCase()+b.status.slice(1))}</span>
      </div>
      <div class="bc-body">
        <div class="bc-avatar">${ini}</div>
        <div class="bc-info">
          <div class="bc-name">${esc(b.providerName||"Provider")}</div>
          <div class="bc-service">${esc(b.service||"Service")}</div>
          <div class="bc-meta">
            ${b.date?`<span class="bc-meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${esc(b.date)} ${esc(b.time||"")}</span>`:""}
            ${b.address?`<span class="bc-meta-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(b.address)}</span>`:""}
          </div>
        </div>
        <div class="bc-amount">${formatNGN(b.total||b.serviceFee||0)}</div>
      </div>
      ${b.notes?`<div class="bc-notes">"${esc(b.notes)}"</div>`:""}
      <div class="bc-footer">
        <div class="bc-actions">
          ${canCancel?`<button class="btn btn-danger btn-sm cancel-btn" data-id="${b.id}">Cancel</button>`:""}
          ${canReview?`<button class="btn btn-accent btn-sm review-btn" data-id="${b.id}" data-pid="${esc(b.providerId||"")}" data-pname="${esc(b.providerName||"")}">Leave Review</button>`:""}
          ${b.status==="completed"&&b.reviewed?`<span style="font-size:11px;color:var(--success);font-weight:600">✅ Reviewed</span>`:""}
          <button class="btn btn-ghost btn-sm" onclick="location.href='./chat.html?uid=${esc(b.providerId||"")}'" ${!b.providerId?"disabled":""}>
            💬 Chat
          </button>
        </div>
        <span style="font-size:11px;color:var(--text-3)">${b.createdAt?.toDate?.()?.toLocaleDateString("en-NG")||""}</span>
      </div>
    </div>`;
  }).join("");

  // Cancel buttons
  el.querySelectorAll(".cancel-btn").forEach(btn => btn.addEventListener("click", () => {
    cancelBookingId = btn.dataset.id;
    $("cancelOverlay").classList.add("active");
  }));

  // Review buttons
  el.querySelectorAll(".review-btn").forEach(btn => btn.addEventListener("click", () => {
    reviewBookingId  = btn.dataset.id;
    reviewProviderId = btn.dataset.pid;
    $("reviewProviderName").textContent = `How was ${btn.dataset.pname||"your provider"}?`;
    selectedStars = 0;
    document.querySelectorAll("#starInput button").forEach(s => s.classList.remove("on"));
    $("reviewComment").value = "";
    $("reviewOverlay").classList.add("active");
  }));
}

// Tabs
document.querySelectorAll(".pill-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".pill-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active"); activeTab = tab.dataset.tab; renderList();
  });
});

// Cancel flow
$("cancelNo").addEventListener("click",  () => { $("cancelOverlay").classList.remove("active"); cancelBookingId = null; });
$("cancelYes").addEventListener("click", async () => {
  if (!cancelBookingId) return;
  try {
    showSpinner();
    await updateDoc(doc(db,"bookings",cancelBookingId), { status:"cancelled", updatedAt: serverTimestamp() });
    const b = allBookings.find(x => x.id===cancelBookingId);
    if (b) b.status = "cancelled";
    $("cancelOverlay").classList.remove("active");
    updateCounts(); updateStats(); renderList();
    toast("Booking cancelled.", "info");
  } catch(e) { toast("Failed to cancel. Try again.", "error"); }
  finally { hideSpinner(); cancelBookingId = null; }
});

// Star rating
document.querySelectorAll("#starInput button").forEach(btn => {
  btn.addEventListener("click", () => {
    selectedStars = parseInt(btn.dataset.v);
    document.querySelectorAll("#starInput button").forEach((s,i) => s.classList.toggle("on", i<selectedStars));
  });
});

// Submit review
$("submitReview").addEventListener("click", async () => {
  if (!selectedStars) { toast("Please select a star rating.", "warning"); return; }
  const sBtn = $("submitReview"); sBtn.disabled = true; sBtn.classList.add("loading");
  try {
    await addDoc(collection(db,"reviews"), {
      bookingId: reviewBookingId, seekerId: currentUser.uid,
      seekerName: currentUser.displayName||"", providerId: reviewProviderId,
      rating: selectedStars, comment: $("reviewComment").value.trim(),
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db,"bookings",reviewBookingId), { reviewed: true });
    const b = allBookings.find(x => x.id===reviewBookingId);
    if (b) b.reviewed = true;
    $("reviewOverlay").classList.remove("active");
    renderList();
    toast("Review submitted! Thank you. ⭐", "success");
  } catch(e) { toast("Failed to submit review.", "error"); }
  finally { sBtn.disabled = false; sBtn.classList.remove("loading"); reviewBookingId = null; reviewProviderId = null; }
});

$("closeReview").addEventListener("click", () => $("reviewOverlay").classList.remove("active"));
document.addEventListener("keydown", e => {
  if (e.key==="Escape") { $("reviewOverlay").classList.remove("active"); $("cancelOverlay").classList.remove("active"); }
});
</script>
</body>
</html>
