<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1A237E"/>
  <title>Servana — You're Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:  #1A237E;
      --accent: #6C3CE1;
      --gold:   #FFD60A;
      --text-1: #0D1B4B;
      --text-2: #4A5880;
      --text-3: #8C9BBF;
      --bg:     #EEF2FF;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-1: #E4EAFF; --text-2: #7D8FC4; --text-3: #3D4E7A; --bg: #080E30;
      }
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Animated background blobs */
    .blob {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob-1 { width: 400px; height: 400px; top: -100px; right: -80px; background: radial-gradient(circle, rgba(26,35,126,.08) 0%, transparent 70%); }
    .blob-2 { width: 300px; height: 300px; bottom: -60px; left: -60px; background: radial-gradient(circle, rgba(108,60,225,.07) 0%, transparent 70%); animation-delay: -4s; }
    @keyframes blobFloat { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 36px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(13,21,96,.15);
      position: relative;
      z-index: 1;
      animation: cardIn .5s cubic-bezier(.25,.8,.25,1) both;
    }

    @media (prefers-color-scheme: dark) {
      .card { background: #0F1848; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
    }

    @keyframes cardIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

    /* Logo */
    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 32px;
    }
    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 700;
      color: var(--brand); letter-spacing: 2px;
    }

    /* Animated signal icon */
    .signal-wrap {
      position: relative; width: 96px; height: 96px;
      margin: 0 auto 24px;
    }
    .signal-icon {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(26,35,126,.08), rgba(108,60,225,.10));
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
    }
    .signal-ring {
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(108,60,225,.2);
      animation: ringPulse 2s ease-in-out infinite;
    }
    .signal-ring:nth-child(2) { inset: -16px; animation-delay: .4s; opacity: .6; }
    .signal-ring:nth-child(3) { inset: -24px; animation-delay: .8s; opacity: .3; }
    @keyframes ringPulse { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.1);opacity:.1} }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px; font-weight: 700;
      color: var(--text-1); margin-bottom: 10px; line-height: 1.25;
    }
    p {
      font-size: 14px; color: var(--text-2);
      line-height: 1.65; margin-bottom: 28px;
    }

    /* Cached pages list */
    .cached-section {
      background: rgba(26,35,126,.05);
      border: 0.5px solid rgba(26,35,126,.10);
      border-radius: 14px; padding: 16px;
      margin-bottom: 24px; text-align: left;
    }
    .cached-title {
      font-size: 11px; font-weight: 700; color: var(--text-3);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
    }
    .cached-link {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px;
      text-decoration: none; color: var(--text-2);
      font-size: 13px; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .cached-link:hover { background: rgba(26,35,126,.06); color: var(--text-1); }
    .cached-link svg {
      width: 15px; height: 15px; stroke: currentColor;
      fill: none; stroke-width: 1.9; stroke-linecap: round;
      stroke-linejoin: round; flex-shrink: 0;
    }

    /* Buttons */
    .btn-retry {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      color: #fff; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: .3px;
      box-shadow: 0 6px 20px rgba(108,60,225,.30);
      transition: opacity .2s, transform .15s;
      margin-bottom: 10px;
    }
    .btn-retry:hover   { opacity: .88; }
    .btn-retry:active  { transform: scale(.98); }

    .status-row {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: 12px; color: var(--text-3); margin-top: 16px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #DC2626; flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }
    .status-dot.online { background: #16A34A; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <img src="./assets/images/logo.png" alt="Servana"
           style="width:32px;height:32px;border-radius:8px;object-fit:cover"
           onerror="this.style.display='none'">
      <span class="logo-text">SERVANA</span>
    </div>

    <!-- Icon -->
    <div class="signal-wrap">
      <div class="signal-ring"></div>
      <div class="signal-ring"></div>
      <div class="signal-ring"></div>
      <div class="signal-icon">📡</div>
    </div>

    <h1>You're Offline</h1>
    <p>
      Servana needs an internet connection to show you live service providers
      and booking updates. Please check your network and try again.
    </p>

    <!-- Cached pages available offline -->
    <div class="cached-section" id="cachedSection" style="display:none">
      <div class="cached-title">Available Offline</div>
      <div id="cachedLinks"></div>
    </div>

    <button class="btn-retry" id="retryBtn">
      🔄 &nbsp;Try Again
    </button>

    <!-- Connection status -->
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">No internet connection</span>
    </div>

  </div>

  <script>
    const retryBtn    = document.getElementById("retryBtn");
    const statusDot   = document.getElementById("statusDot");
    const statusText  = document.getElementById("statusText");
    const cachedSec   = document.getElementById("cachedSection");
    const cachedLinks = document.getElementById("cachedLinks");

    // ── Retry button ─────────────────────────────────────
    retryBtn.addEventListener("click", () => {
      retryBtn.textContent = "⏳ Checking…";
      retryBtn.disabled    = true;

      // Try to fetch a small resource to check connectivity
      fetch("./manifest.json", { cache: "no-store" })
        .then(() => {
          statusDot.classList.add("online");
          statusText.textContent = "Back online! Redirecting…";
          setTimeout(() => {
            // Go back to where the user was trying to go,
            // or fall back to dashboard
            const intended = sessionStorage.getItem("servana-intended") || "./dashboard.html";
            location.href = intended;
          }, 800);
        })
        .catch(() => {
          retryBtn.textContent = "🔄 Try Again";
          retryBtn.disabled    = false;
          shakeCard();
        });
    });

    // ── Online/offline events ─────────────────────────────
    window.addEventListener("online", () => {
      statusDot.classList.add("online");
      statusText.textContent = "Connection restored! Reloading…";
      setTimeout(() => location.reload(), 1200);
    });

    window.addEventListener("offline", () => {
      statusDot.classList.remove("online");
      statusText.textContent = "No internet connection";
    });

    // Initial state
    if (navigator.onLine) {
      statusDot.classList.add("online");
      statusText.textContent = "You're online — something else went wrong.";
    }

    // ── Show cached pages ─────────────────────────────────
    const CACHED_PAGES = [
      { url: "./dashboard.html", icon: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',   label: "Dashboard" },
      { url: "./seeker.html",    icon: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',                           label: "Find Services" },
      { url: "./bookings.html",  icon: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/>',                 label: "My Bookings" },
      { url: "./profile.html",   icon: '<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>',                                  label: "My Profile" },
    ];

    if ("caches" in window) {
      caches.keys().then(keys => {
        if (!keys.length) return;
        return caches.open(keys[0]);
      }).then(cache => {
        if (!cache) return;
        cachedLinks.innerHTML = CACHED_PAGES.map(p => `
          <a href="${p.url}" class="cached-link">
            <svg viewBox="0 0 24 24">${p.icon}</svg>
            ${p.label}
          </a>`).join("");
        cachedSec.style.display = "block";
      }).catch(() => {});
    }

    // ── Subtle card shake on failed retry ─────────────────
    function shakeCard() {
      const card = document.querySelector(".card");
      card.style.animation = "none";
      card.style.transform = "translateX(-8px)";
      setTimeout(() => {
        card.style.transition = "transform .4s cubic-bezier(.25,.8,.25,1)";
        card.style.transform  = "translateX(0)";
        setTimeout(() => card.style.transition = "", 400);
      }, 50);
    }

    // ── Save intended URL (call from pages before navigating) ──
    // If pages save location.href before navigating to external
    // URLs, we restore it after going back online:
    window.addEventListener("beforeunload", () => {
      if (location.href !== location.origin + "/offline.html") {
        sessionStorage.setItem("servana-intended", location.href);
      }
    });
  </script>

</body>
</html>
